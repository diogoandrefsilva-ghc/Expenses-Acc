<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Accenture · Despesas Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#12141a;--card:#1a1d23;--card2:#22252b;--border:rgba(255,255,255,0.06);
  --text:#f0f0f0;--text2:#999;--text3:#666;
  --orange:#e67e22;--amber:#f39c12;--green:#27ae60;--blue:#3498db;--purple:#9b59b6;--red:#e74c3c;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-tap-highlight-color:transparent}
body{overflow-x:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* Header */
.header{background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);padding:24px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.brand-label{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--orange);text-transform:uppercase}
.brand-title{font-size:20px;font-weight:700;margin-top:2px}
.btn-settings{background:rgba(255,255,255,0.06);border:none;border-radius:10px;padding:8px 12px;color:var(--text2);font-size:18px;cursor:pointer}

/* FY Tabs */
.fy-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fy-tabs::-webkit-scrollbar{display:none}
.fy-tab{padding:6px 14px;border-radius:20px;border:none;white-space:nowrap;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.fy-tab.active{background:var(--orange);color:#fff}
.fy-tab:not(.active){background:rgba(255,255,255,0.06);color:#888}

/* Dashboard */
.dashboard{padding:20px 20px 0}
.dash-main{display:flex;align-items:center;gap:20px;background:linear-gradient(135deg,rgba(230,126,34,0.08),rgba(243,156,18,0.04));border-radius:16px;padding:20px;border:1px solid rgba(230,126,34,0.12)}
.ring-wrap{position:relative;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:22px;font-weight:700;font-family:var(--mono)}
.ring-label{font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.dash-grid{flex:1;min-width:0;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dash-item-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.dash-item-value{font-size:16px;font-weight:700;font-family:var(--mono)}
.dash-item-value.sm{font-size:14px;font-weight:600}

/* Category cards */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.cat-card{background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 8px;text-align:center}
.cat-icon{font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.cat-icon svg{width:18px;height:18px}
.cat-name{font-size:9px;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.cat-val{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:2px}
.cat-avg{font-size:9px;color:#666;font-family:var(--mono);margin-top:1px;font-weight:500}

/* Comparison table */
.comp-table{background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.comp-row{display:grid;grid-template-columns:48px repeat(4,1fr) 68px;align-items:center;padding:8px 10px;position:relative;gap:4px}
.comp-row:not(:last-child){border-bottom:1px solid var(--border)}
.comp-row-head{background:rgba(255,255,255,0.02)}
.comp-row-head .comp-cell{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#666}
.comp-cell{font-size:10px;font-family:var(--mono);font-weight:500;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp-fy-cell{text-align:left;font-weight:700;color:var(--text)}
.comp-total-cell{font-weight:700;color:var(--text)}
.comp-bar-track{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.03)}
.comp-bar{height:100%;border-radius:1px;transition:width .4s ease}

/* Filters */
.filters{padding:16px 20px 8px;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;align-items:center;gap:0}
.filter-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;width:42px}
.filter-pipe{width:1.5px;height:18px;background:rgba(255,255,255,0.1);flex-shrink:0;margin:0 10px 0 8px;border-radius:1px}
.filter-btns{display:flex;gap:5px;flex-wrap:wrap}
.filter-btn{padding:5px 10px;border-radius:14px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}

/* Expense list */
.list-wrap{padding:8px 20px 100px}
.list-count{font-size:12px;color:#888;margin-bottom:10px}
.exp-list{display:flex;flex-direction:column;gap:6px}
.exp-row{background:rgba(255,255,255,0.03);border-radius:12px;padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.exp-row:active{background:rgba(255,255,255,0.06)}
.exp-row.pending{border-color:rgba(243,156,18,0.2)}
.exp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-icon svg{width:20px;height:20px}
.exp-info{flex:1;min-width:0}
.exp-desc-row{display:flex;align-items:center;gap:6px}
.exp-desc{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0}
.badge-pending{background:var(--amber);color:#000}
.badge-reimb{background:rgba(39,174,96,0.2);color:var(--green)}
.exp-meta{font-size:11px;color:#777;margin-top:2px}
.exp-amount{font-size:15px;font-weight:700;font-family:var(--mono);flex-shrink:0;text-align:right}
.exp-amount-prov{font-size:10px;color:#666;font-family:var(--mono);text-decoration:line-through;font-weight:500}
.exp-status{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.exp-status svg{width:13px;height:13px}
.exp-status.confirmed{background:rgba(39,174,96,0.15)}
.exp-status.not-confirmed{background:rgba(255,255,255,0.04)}

/* Sync pill */
.syncpill{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 10px;border-radius:14px;margin-left:auto}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}.dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}.dot.err{background:var(--red)}
.spin{width:10px;height:10px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4);max-width:90%;text-align:center;font-family:var(--font)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)}.toast.bad{border-color:var(--red)}

/* Read-only mode */
body.read-only .fab{display:none!important}
body.read-only .btn-save{opacity:0.4;pointer-events:none}
body.read-only .btn-danger{opacity:0.4;pointer-events:none}
.readonly-banner{display:none;text-align:center;font-size:11px;color:var(--text3);background:rgba(52,152,219,0.06);border:1px solid rgba(52,152,219,0.15);border-radius:10px;padding:7px 14px;margin:0 20px 8px;font-family:var(--font)}
body.read-only .readonly-banner{display:block}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--orange),var(--amber));border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 8px 24px rgba(230,126,34,0.4);display:flex;align-items:center;justify-content:center;z-index:50}

/* Modal */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
.overlay.open{opacity:1;visibility:visible}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px)}
.modal{position:relative;background:linear-gradient(180deg,#1e2128 0%,var(--card) 100%);border-radius:20px 20px 0 0;padding:28px 24px calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.5);border:1px solid var(--border);border-bottom:none;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,.24,1)}
.overlay.open .modal{transform:translateY(0)}
.modal::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:4px;background:rgba(255,255,255,0.15)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;padding-top:8px}
.modal-title{font-size:19px;font-weight:700;letter-spacing:-0.2px}
.btn-close{background:rgba(255,255,255,0.06);border:none;color:#888;font-size:18px;cursor:pointer;padding:6px 8px;border-radius:8px;transition:background .15s}
.btn-close:active{background:rgba(255,255,255,0.12)}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;margin-bottom:6px;font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:12px 14px;background:var(--card2);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
.form-input:focus{border-color:rgba(230,126,34,0.5);box-shadow:0 0 0 3px rgba(230,126,34,0.08)}
.form-input::placeholder{color:#555}
input[type="date"].form-input{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.3px}
input[type="date"].form-input::-webkit-calendar-picker-indicator{filter:invert(0.6);opacity:0.6;cursor:pointer}
input[type="number"].form-input{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.3px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row .form-group{margin-bottom:16px}

/* Inline label+input alignment trick — both columns share identical structure */
.form-row .form-label{height:16px;line-height:16px}
.form-row .form-input{height:48px}

.cat-btns{display:flex;gap:8px}
.cat-btn{flex:1;padding:12px 4px;border-radius:12px;font-size:11px;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s ease;display:flex;flex-direction:column;align-items:center;gap:6px}
.cat-btn:active{transform:scale(0.95)}
.cat-btn .cat-btn-icon{font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center}
.cat-btn .cat-btn-icon svg{width:24px;height:24px}
.cat-btn .cat-btn-label{font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.3px}

/* Status toggle buttons */
.check-row{display:flex;align-items:center;gap:0;margin:16px 0 6px;flex-wrap:wrap}
.status-group{display:flex;gap:6px;align-items:center}
.status-pipe{width:1.5px;height:20px;background:rgba(255,255,255,0.1);flex-shrink:0;margin:0 10px;border-radius:1px}
.status-btn{padding:7px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.08);background:transparent;color:#666;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;-webkit-user-select:none;user-select:none}
.status-btn:active{transform:scale(0.95)}
.status-btn.active-forecast{border-color:rgba(243,156,18,0.4);background:rgba(243,156,18,0.12);color:var(--amber)}
.status-btn.active-confirmed{border-color:rgba(52,152,219,0.4);background:rgba(52,152,219,0.12);color:var(--blue)}
.status-btn.active-reimb{border-color:rgba(39,174,96,0.4);background:rgba(39,174,96,0.12);color:var(--green)}

.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:14px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.08);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-family:var(--font);font-weight:500;transition:background .15s}
.btn-cancel:active{background:rgba(255,255,255,0.04)}
.btn-save{flex:1;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;font-size:14px;cursor:pointer;font-weight:700;font-family:var(--font);letter-spacing:.2px;transition:opacity .15s,transform .1s}
.btn-save:active{opacity:0.85;transform:scale(0.98)}
.btn-danger{padding:14px;border-radius:12px;border:1.5px solid rgba(231,76,60,0.25);background:rgba(231,76,60,0.06);color:var(--red);font-size:14px;cursor:pointer;font-weight:600;font-family:var(--font);width:100%;transition:background .15s}
.btn-danger:active{background:rgba(231,76,60,0.12)}
.btn-outline-orange{padding:14px;border-radius:12px;border:1.5px solid rgba(230,126,34,0.25);background:rgba(230,126,34,0.06);color:var(--orange);font-size:14px;cursor:pointer;font-weight:600;font-family:var(--font);width:100%;transition:background .15s}
.btn-outline-orange:active{background:rgba(230,126,34,0.12)}
.settings-field{margin-bottom:16px}
.wbs-display{padding:12px 14px;background:var(--card2);border-radius:10px;color:var(--orange);font-size:14px;font-family:var(--mono)}
.empty-state{text-align:center;padding:40px;color:#555;font-size:14px}

/* € prefix inside valor input */
.input-currency-wrap{position:relative}
.input-currency-wrap .form-input{padding-left:32px}
.input-currency-wrap::before{content:"€";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#666;font-size:14px;font-family:var(--mono);font-weight:600;pointer-events:none}

/* Desktop: centered modal instead of bottom sheet */
@media(min-width:600px){
  .overlay{align-items:center}
  .modal{border-radius:20px;max-width:460px;border-bottom:1px solid var(--border);transform:translateY(24px) scale(0.97);opacity:0;transition:transform .3s cubic-bezier(.32,.72,.24,1),opacity .25s ease}
  .overlay.open .modal{transform:translateY(0) scale(1);opacity:1}
  .modal::before{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="brand-label">Accenture</div>
      <div class="brand-title">Despesas Manager</div>
    </div>
    <div class="syncpill"><span class="dot" id="sync-dot"></span><span id="sync-txt">a ligar…</span></div>
    <button class="btn-settings" onclick="openSettings()">⚙️</button>
  </div>
  <div class="fy-tabs" id="fyTabs"></div>
</div>

<div class="readonly-banner">🔒 Modo leitura — configura o token (⚙) para editar</div>

<div class="dashboard" id="dashboard"></div>
<div class="filters" id="filters"></div>
<div class="list-wrap" id="listWrap"></div>
<button class="fab" onclick="openForm()">+</button>

<!-- Form Modal -->
<div class="overlay" id="formModal">
  <div class="overlay-bg" onclick="closeForm()"></div>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="formTitle">Nova Despesa</span>
      <button class="btn-close" onclick="closeForm()">✕</button>
    </div>
    <div id="formBody"></div>
  </div>
</div>

<!-- Delete Modal -->
<div class="overlay" id="deleteModal">
  <div class="overlay-bg" onclick="closeDelete()"></div>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Apagar Despesa</span>
      <button class="btn-close" onclick="closeDelete()">✕</button>
    </div>
    <p style="color:#ccc;font-size:14px;margin-bottom:20px">Tens a certeza que queres apagar esta despesa?</p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeDelete()">Cancelar</button>
      <button class="btn-save" style="background:#e74c3c" onclick="confirmDelete()">Apagar</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settingsModal">
  <div class="overlay-bg" onclick="closeSettings()"></div>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Definições</span>
      <button class="btn-close" onclick="closeSettings()">✕</button>
    </div>
    <div id="settingsBody"></div>
  </div>
</div>

<!-- Comparison Modal -->
<div class="overlay" id="comparisonModal">
  <div class="overlay-bg" onclick="closeComparison()"></div>
  <div class="modal" style="max-height:95vh">
    <div class="modal-header">
      <span class="modal-title">Comparação por FY</span>
      <button class="btn-close" onclick="closeComparison()">✕</button>
    </div>
    <div id="comparisonBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───
const CATEGORIES = ["Galp","Meal","Telemóveis","Outro"];
const CAT_COLORS = {Galp:"#e67e22",Meal:"#27ae60","Telemóveis":"#3498db",Outro:"#9b59b6"};
const CAT_ICONS = {Galp:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e67e22" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16"/><path d="M3 22h10"/><path d="M13 11h3a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"/><path d="M6 12h4"/></svg>`,Meal:"🍽️","Telemóveis":"📱",Outro:"📦"};

// ─── GITHUB CONFIG ───
const GH = { owner:'diogoandrefsilva-ghc', repo:'AppDataJSON', path:'expensesacc-data.json', branch:'main' };
const TOKEN_KEY = 'acc_gh_token';
function getToken(){ return localStorage.getItem(TOKEN_KEY)||''; }

// ─── STATE ───
let appData = null;
let activeFY = "";
let filterType = "all";
let filterStatus = "all";
let editingId = null;
let deleteId = null;
let GH_SHA = null;

// ─── HELPERS ───
const fmt = v => new Intl.NumberFormat("pt-PT",{style:"currency",currency:"EUR"}).format(v);
const fmtDate = d => { if(!d) return "—"; const dt=new Date(d+"T00:00:00"); return dt.toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"}); };
const genId = () => "e"+Date.now()+Math.random().toString(36).slice(2,6);
function getCurrentFY(){ const n=new Date(),m=n.getMonth()+1,y=n.getFullYear(); return m>=11?`FY${(y+1).toString().slice(2)}`:`FY${y.toString().slice(2)}`; }

// ─── SYNC UI ───
function setSync(st,txt){
  const d=document.getElementById('sync-dot');const t=document.getElementById('sync-txt');
  if(st==='load'){d.outerHTML='<span class="spin" id="sync-dot"></span>';}
  else{const el=document.getElementById('sync-dot');if(el.tagName!=='SPAN'||el.classList.contains('spin')){el.outerHTML=`<span class="dot ${st==='live'?'live':st==='err'?'err':''}" id="sync-dot"></span>`;}
  else{el.className='dot'+(st==='live'?' live':st==='err'?' err':'');}}t.textContent=txt;
}
function toast(msg,kind){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(kind||'');setTimeout(()=>t.className='toast',3000);}
function updateReadOnlyMode(){ document.body.classList.toggle('read-only',!getToken()); }

// ─── GITHUB IO ───
async function carregar(){
  setSync('load','a ler do GitHub…');
  try{
    const tk=getToken();
    let decoded;
    if(tk){
      // Editor: ler pela API autenticada (sempre fresca, sem cache de CDN) e guardar o sha.
      const res=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}?ref=${GH.branch}&t=${Date.now()}`,{headers:{Authorization:'token '+tk,Accept:'application/vnd.github.v3+json'},cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const j=await res.json();
      GH_SHA=j.sha;
      decoded=decodeURIComponent(escape(atob(j.content)));
    } else {
      // Leitura pública via raw (CDN, sem token) — apenas para modo de leitura.
      const res=await fetch(`https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/${GH.branch}/${GH.path}?t=${Date.now()}`,{cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      decoded=await res.text();
    }
    appData=JSON.parse(decoded);
    activeFY=getCurrentFY();
    if(!appData.configs[activeFY]) activeFY=Object.keys(appData.configs).sort((a,b)=>b.localeCompare(a))[0];
    render();
    setSync('live','sincronizado · '+new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}));
    updateReadOnlyMode();
  }catch(e){
    setSync('err','sem ligação');
    toast('Erro ao carregar: '+e.message,'bad');
  }
}

let _writeChain = Promise.resolve();
let _writePending = 0;
function pushToGitHub(msg){
  // Serializa as gravações: o próximo push só arranca quando o anterior terminar
  // (sucesso ou erro), para que o sha obtido antes do PUT esteja sempre fresco.
  _writePending++;
  _writeChain = _writeChain.then(()=>_doPush(msg), ()=>_doPush(msg)).finally(()=>{_writePending--;});
  return _writeChain;
}

async function _doPush(msg){
  const tk=getToken();
  if(!tk){ toast('Configura o token primeiro (⚙)','bad'); return false; }
  try{
    // A leitura passou a ser por raw (sem sha); obter o sha mais recente antes de gravar
    try{const chk=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}?ref=${GH.branch}&t=${Date.now()}`,{headers:{Authorization:'token '+tk,Accept:'application/vnd.github.v3+json'},cache:'no-store'});if(chk.ok){const cj=await chk.json();GH_SHA=cj.sha;}else if(chk.status===404){GH_SHA=null;}}catch(_){}
    const body=JSON.stringify({
      message: msg,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(appData,null,2)))),
      sha: GH_SHA,
      branch: GH.branch
    });
    const res=await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${GH.path}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json',Authorization:'token '+tk,Accept:'application/vnd.github.v3+json'},
      body
    });
    if(!res.ok){ const e=await res.json(); throw new Error(e.message||res.status); }
    const r=await res.json(); GH_SHA=r.content.sha;
    setSync('live','guardado · '+new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}));
    return true;
  }catch(e){
    toast('Erro ao guardar: '+e.message,'bad');
    return false;
  }
}

function renderDashboard(){
  const el=document.getElementById("dashboard");
  const exps=appData.expenses.filter(e=>e.fy===activeFY);
  const cfg=appData.configs[activeFY]||{budget:3000};
  const eff=e=>e.finalAmount||e.amount;
  const total=exps.reduce((s,e)=>s+eff(e),0);
  const forecast=exps.filter(e=>e.pending).reduce((s,e)=>s+eff(e),0);
  const provisorias=exps.filter(e=>e.type==="Galp"&&!e.finalAmount&&!e.pending).reduce((s,e)=>s+e.amount,0);
  const confirmed=total-forecast-provisorias;
  const avail=cfg.budget-total;
  const pct=total/cfg.budget;
  const byType={};
  const monthsByType={};
  CATEGORIES.forEach(c=>{
    const items=exps.filter(e=>e.type===c);
    byType[c]=items.reduce((s,e)=>s+eff(e),0);
    // Count distinct months for monthly average
    const months=new Set();
    items.forEach(e=>{
      if(e.date) months.add(e.date.slice(0,7));
      else {
        // For expenses without date, use quinzena or just count as 1 month
        if(e.quinzena) months.add(e.quinzena);
        else months.add("no-date-"+e.id);
      }
    });
    monthsByType[c]=months.size;
  });

  const size=120,stroke=10,r=(size-stroke)/2,circ=2*Math.PI*r,filled=circ*Math.min(pct,1);
  const ringColor=pct>1?"#e74c3c":"#e67e22";
  const pctColor=pct>1?"#e74c3c":"#f0f0f0";
  const availColor=avail>=0?"#27ae60":"#e74c3c";

  el.innerHTML=`
    <div class="dash-main">
      <div class="ring-wrap">
        <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
          <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${stroke}"/>
          <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${ringColor}" stroke-width="${stroke}"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ-filled}" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" style="color:${pctColor}">${Math.round(pct*100)}%</div>
          <div class="ring-label">utilizado</div>
        </div>
      </div>
      <div class="dash-grid" style="grid-template-columns:1fr 1fr">
        <div><div class="dash-item-label">Plafond</div><div class="dash-item-value">${fmt(cfg.budget)}</div></div>
        <div><div class="dash-item-label" style="color:${availColor}">Disponível</div><div class="dash-item-value" style="color:${availColor}">${fmt(avail)}</div></div>
        <div><div class="dash-item-label">Confirmado</div><div class="dash-item-value sm">${fmt(confirmed)}</div></div>
        <div><div class="dash-item-label" style="color:#f39c12">Forecast</div><div class="dash-item-value sm" style="color:#f39c12">${fmt(forecast)}</div></div>
        ${provisorias>0?`<div style="grid-column:span 2"><div class="dash-item-label" style="color:#9b59b6">Provisório (Galp s/ extrato)</div><div class="dash-item-value sm" style="color:#9b59b6">${fmt(provisorias)}</div></div>`:""}
      </div>
    </div>
    <div class="cat-grid">
      ${CATEGORIES.map(c=>{
        const nMonths=monthsByType[c]||1;
        const avg=byType[c]/nMonths;
        return `<div class="cat-card" style="border:1px solid ${CAT_COLORS[c]}15">
          <div class="cat-icon">${CAT_ICONS[c]}</div>
          <div class="cat-name">${c==="Telemóveis"?"Telm.":c}</div>
          <div class="cat-val" style="color:${CAT_COLORS[c]}">${fmt(byType[c])}</div>
          <div class="cat-avg">μ/m ${fmt(avg)}</div>
        </div>`;
      }).join("")}
    </div>`;
}

function renderComparison(){
  const wrap=document.getElementById("comparisonBody");
  const fys=Object.keys(appData.configs).sort((a,b)=>b.localeCompare(a));
  const eff=e=>e.finalAmount||e.amount;

  // Build data per FY
  const data=fys.map(fy=>{
    const exps=appData.expenses.filter(e=>e.fy===fy);
    const row={fy,total:exps.reduce((s,e)=>s+eff(e),0)};
    CATEGORIES.forEach(c=>{row[c]=exps.filter(e=>e.type===c).reduce((s,e)=>s+eff(e),0);});
    return row;
  });

  const maxTotal=Math.max(...data.map(d=>d.total),1);

  // Monthly averages across all FYs
  const allExps=appData.expenses;
  const monthlyAvgs={};
  CATEGORIES.forEach(c=>{
    const catExps=allExps.filter(e=>e.type===c);
    const months=new Set();
    catExps.forEach(e=>{
      if(e.date) months.add(e.date.slice(0,7));
      else if(e.quinzena) months.add(e.quinzena);
      else months.add("nd-"+e.id);
    });
    const totalCat=catExps.reduce((s,e)=>s+eff(e),0);
    const nMonths=months.size||1;
    monthlyAvgs[c]=totalCat/nMonths;
  });
  const totalAll=allExps.reduce((s,e)=>s+eff(e),0);
  const allMonths=new Set();
  allExps.forEach(e=>{
    if(e.date) allMonths.add(e.date.slice(0,7));
    else if(e.quinzena) allMonths.add(e.quinzena);
    else allMonths.add("nd-"+e.id);
  });
  const avgTotal=totalAll/(allMonths.size||1);

  wrap.innerHTML=`
    <div class="comp-table">
      <div class="comp-row comp-row-head">
        <div class="comp-cell comp-fy-cell"></div>
        ${CATEGORIES.map(c=>`<div class="comp-cell" style="color:${CAT_COLORS[c]}">${c==="Telemóveis"?"Telm.":c}</div>`).join("")}
        <div class="comp-cell comp-total-cell">Total</div>
      </div>
      ${data.map(d=>{
        const barW=Math.round((d.total/maxTotal)*100);
        return `<div class="comp-row">
          <div class="comp-cell comp-fy-cell">${d.fy}</div>
          ${CATEGORIES.map(c=>`<div class="comp-cell" style="color:${CAT_COLORS[c]}">${fmt(d[c])}</div>`).join("")}
          <div class="comp-cell comp-total-cell">${fmt(d.total)}</div>
          <div class="comp-bar-track"><div class="comp-bar" style="width:${barW}%;background:linear-gradient(90deg,var(--orange),var(--amber))"></div></div>
        </div>`;
      }).join("")}
      <div class="comp-row" style="border-top:2px solid rgba(230,126,34,0.2);background:rgba(230,126,34,0.04)">
        <div class="comp-cell comp-fy-cell" style="font-size:9px;color:var(--text2)">μ/mês</div>
        ${CATEGORIES.map(c=>`<div class="comp-cell" style="color:${CAT_COLORS[c]};opacity:0.7;font-size:10px">${fmt(monthlyAvgs[c])}</div>`).join("")}
        <div class="comp-cell comp-total-cell" style="font-size:10px;opacity:0.7">${fmt(avgTotal)}</div>
      </div>
    </div>`;
}

function renderList(){
  const el=document.getElementById("listWrap");
  let list=appData.expenses.filter(e=>e.fy===activeFY);
  if(filterType!=="all") list=list.filter(e=>e.type===filterType);
  if(filterStatus==="forecast") list=list.filter(e=>e.pending);
  if(filterStatus==="confirmed") list=list.filter(e=>!e.pending);
  if(filterStatus==="reimbursed") list=list.filter(e=>e.reimbursed);
  list.sort((a,b)=>{if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return -1;return b.date.localeCompare(a.date);});

  el.innerHTML=`<div class="list-count">${list.length} despesa${list.length!==1?"s":""}</div>`+
    (list.length===0?`<div class="empty-state">Sem despesas registadas</div>`:
    `<div class="exp-list">${list.map(e=>{
      const greenCheck = `<div class="exp-status confirmed"><svg viewBox="0 0 24 24" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
      const blueCheck = `<div class="exp-status confirmed" style="background:rgba(52,152,219,0.15)"><svg viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
      let checkSvg;
      if(e.pending){
        // Forecast: amber clock
        checkSvg = `<div class="exp-status not-confirmed" style="background:rgba(243,156,18,0.1)"><svg viewBox="0 0 24 24" fill="none" stroke="#f39c12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>`;
      } else if(e.type==="Galp"){
        // Galp: green when confirmed by extrato (finalAmount), blue while provisional
        checkSvg = e.finalAmount ? greenCheck : blueCheck;
      } else if(e.reimbursed){
        // Other categories reimbursed: green check
        checkSvg = greenCheck;
      } else {
        // Other categories confirmed (not forecast): blue check
        checkSvg = blueCheck;
      }
      const displayAmount = e.finalAmount||e.amount;
      const showProv = e.type==="Galp" && e.finalAmount && e.finalAmount!==e.amount;
      return `
      <div class="exp-row ${e.pending?"pending":""}" onclick="openEdit('${e.id}')">
        <div class="exp-icon" style="background:${CAT_COLORS[e.type]||CAT_COLORS.Outro}18">${CAT_ICONS[e.type]||"📦"}</div>
        <div class="exp-info">
          <div class="exp-desc-row">
            <span class="exp-desc">${esc(e.desc)}</span>
          </div>
          <div class="exp-meta">${fmtDate(e.date)}${e.quinzena?" · "+esc(e.quinzena):""}</div>
        </div>
        <div class="exp-amount" style="color:${CAT_COLORS[e.type]||CAT_COLORS.Outro}">
          ${fmt(displayAmount)}
          ${showProv?`<div class="exp-amount-prov">${fmt(e.amount)}</div>`:""}
        </div>
        ${checkSvg}
      </div>`}).join("")}</div>`);
}

function renderForm(exp){
  const f=exp||{type:"Galp",date:new Date().toISOString().slice(0,10),desc:"",amount:"",finalAmount:"",quinzena:"",reimbursed:false,pending:false};
  const isGalp=f.type==="Galp";
  const isMeal=f.type==="Meal";
  const amountRow = isGalp
    ? `<div class="form-row">
        <div class="form-group"><label class="form-label">Provisório</label><div class="input-currency-wrap"><input class="form-input" type="number" step="0.01" id="fAmount" value="${f.amount}" placeholder="0.00" inputmode="decimal"></div></div>
        <div class="form-group"><label class="form-label">Final (Extrato)</label><div class="input-currency-wrap"><input class="form-input" type="number" step="0.01" id="fFinalAmount" value="${f.finalAmount||""}" placeholder="—" inputmode="decimal" style="${f.finalAmount?"":"opacity:0.5"}" onfocus="this.style.opacity=1"></div></div>
      </div>`
    : `<div class="form-row">
        <div class="form-group"><label class="form-label">Data</label><input class="form-input" type="date" id="fDate" value="${f.date||""}"></div>
        <div class="form-group"><label class="form-label">Valor</label><div class="input-currency-wrap"><input class="form-input" type="number" step="0.01" id="fAmount" value="${f.amount}" placeholder="0.00" inputmode="decimal"></div></div>
      </div>`;
  const dateRowGalp = isGalp
    ? `<div class="form-group"><label class="form-label">Data</label><input class="form-input" type="date" id="fDate" value="${f.date||""}"></div>`
    : "";

  // Determine status state
  const isForecast = f.pending;
  const isConfirmed = !f.pending;
  const isReimb = f.reimbursed;

  let statusRow = "";
  if(isGalp){
    // Galp: only Forecast toggle (confirmed = has finalAmount, automatic)
    statusRow = `<div class="check-row">
      <div class="status-group">
        <button type="button" class="status-btn ${isForecast?"active-forecast":""}" id="fForecast" onclick="toggleForecastGalp()">Forecast</button>
      </div>
    </div>`;
  } else {
    // Others: Forecast | Confirmada + pipe + Reembolsada (Meal only)
    statusRow = `<div class="check-row">
      <div class="status-group">
        <button type="button" class="status-btn ${isForecast?"active-forecast":""}" id="fForecast" onclick="toggleStatus('forecast')">Forecast</button>
        <button type="button" class="status-btn ${isConfirmed?"active-confirmed":""}" id="fConfirmed" onclick="toggleStatus('confirmed')">Confirmada</button>
      </div>
      ${isMeal?`<div class="status-pipe"></div>
      <div class="status-group">
        <button type="button" class="status-btn ${isReimb?"active-reimb":""}" id="fReimb" onclick="toggleReimb()">Reembolsada</button>
      </div>`:""}
    </div>`;
  }

  document.getElementById("formBody").innerHTML=`
    <div class="form-group"><label class="form-label">Categoria</label>
      <div class="cat-btns">${CATEGORIES.map(c=>`<button class="cat-btn" id="catBtn_${c}" style="border:${f.type===c?`2px solid ${CAT_COLORS[c]}`:"1.5px solid rgba(255,255,255,0.06)"};background:${f.type===c?CAT_COLORS[c]+"22":"transparent"};color:${f.type===c?CAT_COLORS[c]:"#666"}" onclick="selectCat('${c}')"><span class="cat-btn-icon">${CAT_ICONS[c]}</span><span class="cat-btn-label">${c}</span></button>`).join("")}</div>
    </div>
    ${dateRowGalp}
    ${amountRow}
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="fDesc" value="${esc(f.desc)}" placeholder="Ex: Alcochete, Restaurante X..."></div>
    <div class="form-group"><label class="form-label">Quinzena TR / Extrato</label><input class="form-input" id="fQuinzena" value="${esc(f.quinzena)}" placeholder="Ex: Extrato 2026Mai, TR 2026Mai Q1"></div>
    ${statusRow}
    <div class="btn-row"><button class="btn-cancel" onclick="closeForm()">Cancelar</button><button class="btn-save" onclick="saveForm()">Guardar</button></div>
    ${editingId?'<div style="margin-top:12px"><button class="btn-danger" onclick="askDeleteFromEdit()">🗑 Apagar Despesa</button></div>':''}`;
  window._formCat=f.type;
  window._formForecast=isForecast;
  window._formReimb=isReimb;
}

function toggleForecastGalp(){
  window._formForecast=!window._formForecast;
  const btn=document.getElementById("fForecast");
  btn.classList.toggle("active-forecast",window._formForecast);
}

function toggleStatus(which){
  if(which==="forecast"){
    window._formForecast=true;
  } else {
    window._formForecast=false;
  }
  document.getElementById("fForecast").classList.toggle("active-forecast",window._formForecast);
  document.getElementById("fConfirmed").classList.toggle("active-confirmed",!window._formForecast);
}

function toggleReimb(){
  window._formReimb=!window._formReimb;
  const btn=document.getElementById("fReimb");
  btn.classList.toggle("active-reimb",window._formReimb);
}

function selectCat(c){
  const currentValues = {
    type: c,
    date: document.getElementById("fDate")?.value || "",
    desc: document.getElementById("fDesc")?.value || "",
    amount: document.getElementById("fAmount")?.value || "",
    finalAmount: document.getElementById("fFinalAmount")?.value || "",
    quinzena: document.getElementById("fQuinzena")?.value || "",
    pending: window._formForecast || false,
    reimbursed: window._formReimb || false,
  };
  window._formCat = c;
  renderForm(currentValues);
}

async function saveForm(){
  const desc=document.getElementById("fDesc").value.trim();
  const amount=parseFloat(document.getElementById("fAmount").value);
  if(!desc||isNaN(amount)) return;
  if(!getToken()){ toast('Configura o token primeiro (⚙)','bad'); return; }
  const cat=window._formCat||"Galp";
  const fFinal=document.getElementById("fFinalAmount");
  const finalVal=fFinal?parseFloat(fFinal.value):NaN;
  const obj={
    type:cat,
    date:document.getElementById("fDate").value,
    desc, amount,
    finalAmount: cat==="Galp"&&!isNaN(finalVal)?finalVal:null,
    quinzena:document.getElementById("fQuinzena").value.trim(),
    pending:window._formForecast||false,
    reimbursed:cat==="Meal"?(window._formReimb||false):false,
  };
  let commitMsg;
  if(editingId){
    const idx=appData.expenses.findIndex(e=>e.id===editingId);
    if(idx>=0) appData.expenses[idx]={...appData.expenses[idx],...obj};
    commitMsg=`Editar: ${desc} ${fmt(amount)}`;
  } else {
    appData.expenses.push({...obj,id:genId(),fy:activeFY});
    commitMsg=`Nova despesa: ${desc} ${fmt(amount)} (${cat})`;
  }
  closeForm(); render();
  await pushToGitHub(commitMsg);
}

      <label class="form-label">Token GitHub (ghp_…)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" type="password" id="sToken" value="${getToken()}" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" style="font-family:var(--mono);font-size:12px;flex:1">
        <a href="https://github.com/${GH.owner}/${GH.repo}" target="_blank" rel="noopener" title="Ver repositório no GitHub" style="width:40px;height:44px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#888;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;text-decoration:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="btn-outline-orange" onclick="saveToken()" style="flex:1">Guardar token</button>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-top:6px">Repo: ${GH.owner}/${GH.repo} · Sem token = modo leitura</div>
    </div>
    <div style="height:1px;background:var(--border);margin:16px 0"></div>
    <div class="settings-field"><label class="form-label">Plafond ${activeFY} (€)</label><input class="form-input" type="number" id="sBudget" value="${cfg.budget}" onchange="updateBudget()"></div>
    <div class="settings-field"><label class="form-label">WBS</label><div class="wbs-display">${cfg.wbs||"GI241002"}</div></div>
    <div class="settings-field"><button class="btn-outline-orange" onclick="addNewFY()">+ Criar Novo FY</button></div>
    <div class="settings-field"><button class="btn-outline-orange" onclick="exportJSON()">📥 Exportar JSON</button></div>
    <div class="settings-field"><button class="btn-outline-orange" onclick="carregar()">🔄 Recarregar do GitHub</button></div>`;
  document.getElementById("settingsModal").classList.add("open");
}
function closeSettings(){ document.getElementById("settingsModal").classList.remove("open"); }

function saveToken(){
  const t=document.getElementById("sToken").value.trim();
  if(t) localStorage.setItem(TOKEN_KEY,t); else localStorage.removeItem(TOKEN_KEY);
  updateReadOnlyMode();
  toast(t?'Token guardado ✓':'Token removido','ok');
}


async function updateBudget(){
  const v=parseFloat(document.getElementById("sBudget").value)||3000;
  appData.configs[activeFY].budget=v; render();
  await pushToGitHub(`Plafond ${activeFY}: ${fmt(v)}`);
}
async function addNewFY(){
  const nums=Object.keys(appData.configs).map(f=>parseInt(f.slice(2))).sort((a,b)=>b-a);
  const next=nums[0]+1; const fy=`FY${next}`;
  appData.configs[fy]={budget:3000,wbs:"GI241002"};
  activeFY=fy; closeSettings(); render();
  await pushToGitHub(`Novo FY: ${fy}`);
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(appData,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="despesas_accenture.json"; a.click();
}
// ─── GO ───
init();
document.addEventListener('visibilitychange',()=>{if(!document.hidden && _writePending===0) carregar();});
</script>
</body>
</html>
